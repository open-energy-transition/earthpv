provenance: "p_real(b) = mapped_frac(b) + (1-mapped_frac(b)) * p_u(b); p_u from manual\
  \ review of unmapped candidates where sampled (n>=20), else glint inversion p_u(b)\
  \ = clip((v_b - f)/(S_b - f), 0, 1). S from the 500-target study on OSM-confirmed\
  \ installations (results/glint_validation_pakistan/), f from 69 Lahore no-PV controls,\
  \ v from a stratified glint sample of unmapped candidates (scripts/glint_candidate_precision.py).\
  \ recall(b) = fraction of coverage-restricted, pipeline-independent mapped OSM installations\
  \ of bin b matched by any candidate; density divides by it (clamped at a floor)\
  \ for the Horvitz-Thompson estimator est_mwp_rc. *_lo/*_hi are the 5th/95th percentiles\
  \ of posteriors over every stored count (Jeffreys Beta for the direct rates; for\
  \ glint bins a uniform-prior binomial-mixture likelihood k ~ Binom(n, p_u*S + (1-p_u)*f),\
  \ which stays honestly flat where S ~ f). The p_real point clips p_u at 0, so where\
  \ the observed glint rate sits below the false floor the floor-leaning point can\
  \ fall below p_real_lo \u2014 the interval, not the point, is the uncertainty statement.\
  \ interim-mapped-only means p_u=0 everywhere: an honest lower bound."
