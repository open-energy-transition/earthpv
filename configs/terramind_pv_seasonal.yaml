# TerraTorch fine-tuning config for PV segmentation — TWO-SEASON stack (20-band).
# Input is [base-season 10 bands, contrast-season 10 bands]. The band list repeats
# the 10 names: TerraTorch duplicates the pretrained S2L2A patch-embed weights into
# both positions (verified), so each season starts from the same pretrained filters
# and the model learns the temporal contrast during fine-tuning. Chips are built with
# each AOI's `stack_window` (configs/aoi.yaml); see chips.py / infer.py.

data:
  # Merged germany + punjab 20-band chip index (scripts/merge_chip_index.py)
  index_path: data/chips/combined/index.parquet
  batch_size: 8
  num_workers: 4

task:
  model_factory: EncoderDecoderFactory
  model_args:
    backbone: terramind_v1_tiny
    backbone_pretrained: true
    backbone_modalities: [S2L2A]
    # 10 band names x2 (base season, then contrast season)
    backbone_bands:
      S2L2A: [BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2,
              BLUE, GREEN, RED, RED_EDGE_1, RED_EDGE_2, RED_EDGE_3,
              NIR_BROAD, NIR_NARROW, SWIR_1, SWIR_2]
    necks:
      - name: SelectIndices
        indices: [2, 5, 8, 11]
      - name: ReshapeTokensToImage
        remove_cls_token: false
      - name: LearnedInterpolateToPyramidal
    decoder: UNetDecoder
    decoder_channels: [256, 128, 64, 32]
    num_classes: 2
    rescale: true
  loss: dice
  # Heavy class imbalance: tiny PV targets vs background.
  class_weights: [0.25, 0.75]
  ignore_index: -1
  lr: 1.0e-4
  optimizer: AdamW
  optimizer_hparams:
    weight_decay: 0.05
  freeze_backbone: false
  plot_on_val: false

trainer:
  max_epochs: 60
  accumulate_grad_batches: 2

checkpoint_dir: data/models
patience: 8
