# Areas of interest and label/chip parameters.
overture_release: "2026-06-17.0"

# Reuse Sentinel-2 composites + OSM/Overture labels already downloaded by the
# sibling `rooftopsenti` project instead of re-fetching (see src/earthpv/local_source.py).
# When a `source_region` dir exists, chips/inference read its composite COGs; the
# STAC/Overture fetchers are the fallback for regions without local artifacts.
local_root: /run/media/tobi/aidisc/rooftopsenti/data

# Solar arrays smaller than this (m²) are kept in labels but flagged; the
# headline target is >= 500 m².
min_array_area_m2: 100.0
# Fraction of a solar polygon that must fall on a building footprint to count as rooftop.
rooftop_overlap_frac: 0.5
# Buildings smaller than this footprint (m²) are ignored for chip screening.
min_roof_area_m2: 200.0

aois:
  # Smoke-test tile: Freiburg im Breisgau + industrial outskirts (~12x11 km)
  freiburg:
    bbox: [7.70, 47.95, 7.90, 48.05]
  # NOTE ON `stack_window` (two-season 20-band stacking): OPT-IN, disabled by default.
  # Setting stack_window on an AOI switches chips/infer to the 2-layer (20-band) path,
  # which requires the 20-band model (configs/terramind_pv_seasonal.yaml) and per-cell
  # contrast composites. The default pipeline and the production checkpoint
  # (data/models/v2_combined/*.ckpt) are 10-band, so these keys are left commented.
  # It was tested and did not beat 10-band on Punjab (see README "Two-season stacking
  # experiment"); to re-enable, uncomment the stack_window below, rebuild the contrast
  # composites, and train/infer with the seasonal config.

  # Training country
  germany:
    bbox: [5.866, 47.270, 15.042, 55.059]
    division: { name: Deutschland, country: DE, subtype: country }
    source_region: germany_500          # rooftopsenti data/<region> dir
    # MGRS tiles held out for validation (geographic split); in the local composite set.
    val_tiles: [32TQT, 32TPT]
    # Two-season opt-in (see note above). When enabled, chips read data/composites/germany
    # (0.1° cells from scripts/build_germany_seasonal.py) and val_tiles must instead be
    # the SW 0.1° cell names: ["0085_0491","0087_0489","0089_0487","0086_0488","0085_0488",
    # "0085_0489","0082_0476","0075_0480","0088_0488","0086_0489","0095_0476"].
    # stack_window: ["2025-11-01", "2026-03-15"]
  # Inference target + PK training source (chips read data/composites/punjab)
  punjab:
    bbox: [69.30, 27.70, 75.40, 34.05]
    division: { name: Punjab, country: PK, subtype: region }
    source_region: pakistan_500         # Punjab tiles are a subset of the PK download
    # Geographic val holdout = the whole Faisalabad cluster (~73.0-73.35E, 31.3-31.55N),
    # a contiguous block ~100 km from the Lahore training cluster so jitter/window overlap
    # can't leak val positives into train. ~31% of Punjab positives, rooftop-dominant.
    # (chips stage tags split=val for chips whose composite cell is in this list.)
    val_tiles: ["0035_0036", "0036_0036", "0036_0037", "0036_0038", "0037_0036",
                "0037_0037", "0037_0038", "0038_0036", "0038_0037", "0038_0038",
                "0039_0037", "0039_0038", "0040_0037", "0040_0038"]
    # Two-season opt-in (see note above): clear post-monsoon contrast to the dry-season base.
    # stack_window: ["2025-09-20", "2025-11-15"]
  # Country-wide inference: compose + infer over every building-populated cell.
  # grid_origin anchors the cell grid to punjab's (boundary total_bounds origin,
  # full precision) so punjab's already-composited cells are reused by renaming.
  pakistan:
    bbox: [60.87, 23.80, 77.13, 37.09]
    division: { name: Pakistan, country: PK, subtype: country }
    source_region: pakistan_500
    grid_origin: [69.3405158324398, 27.7089663393252]
    # Small geographic val holdout: an isolated Multan-area cluster (~71.6E, 30.3N),
    # rooftop-dominant, ~20 km from the nearest training positive so no window/jitter
    # leakage. Deliberately small (~38 positives, ~1.5%) to maximise training data.
    val_tiles: ["0106_0064", "0107_0065", "0108_0065"]
    # Two-season opt-in (see note above).
    # stack_window: ["2025-09-20", "2025-11-15"]

  # India pilot: no rooftopsenti local dataset exists for India (unlike PK/DE), so this
  # is the first AOI exercising compose.py's VIDA-buildings + geoBoundaries fallbacks
  # (no `source_region` key here on purpose). Gujarat chosen as the pilot state — it has
  # India's highest rooftop-solar penetration (Surya Gujarat / net-metering programs),
  # concentrated in mid-size cities (Ahmedabad, Surat, Vadodara, Rajkot) rather than
  # spread thin like utility-scale-heavy states (e.g. Rajasthan). Detection uses the
  # existing Germany-trained checkpoint (data/models/v2_combined) unchanged, same as the
  # original Punjab bootstrap — no India-specific retraining yet.
  gujarat:
    bbox: [68.0, 20.0, 74.6, 24.8]
    division: { name: Gujarat, country: IN, subtype: region }

seasons:
  spring: ["2025-03-01", "2025-05-31"]
  summer: ["2025-06-01", "2025-08-31"]
  autumn: ["2025-09-01", "2025-11-30"]
  winter: ["2025-12-01", "2026-02-28"]
